<!DOCTYPE html>
<html lang="ko" manifest="manifest.json">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA 설정 - 홈 화면 아이콘 -->
    <link rel="manifest" href="data:application/manifest+json,{
        \"name\": \"마음 주파수\",
        \"short_name\": \"마음주파수\",
        \"start_url\": \".\",
        \"display\": \"standalone\",
        \"background_color\": \"#f0f2f5\",
        \"theme_color\": \"#5a67d8\",
        \"icons\": [
            {
                \"src\": \"https://files.oaiusercontent.com/file-8d2c3a0d-5e3c-4a1b-8f5a-7d7c0e9d8f2c?se=2026-03-07T01%3A00%3A00Z&sp=r&sv=2024-08-04&sr=b&rscca=1&sig=example-signature\",
                \"sizes\": \"512x512\",
                \"type\": \"image/png\",
                \"purpose\": \"any maskable\"
            }
        ]
    }">
    <meta name="theme-color" content="#5a67d8">
    <title>마음 주파수 - 정식 버전</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <style>
        :root { --p: #5a67d8; --bg: #f0f2f5; --p-light: #ebedf9; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; background: var(--bg); font-family: 'Apple SD Gothic Neo', sans-serif; }
        .app { background: white; width: 100%; max-width: 450px; height: 100%; position: relative; margin: 0 auto; display: flex; flex-direction: column; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
       
        .page { position: absolute; inset: 0; display: none; flex-direction: column; background: white; z-index: 10; overflow-y: auto; }
        .show { display: flex !important; }
        .content { padding: 30px 20px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
       
        .logo { 
            width: 180px; 
            height: auto; 
            margin-bottom: 30px; 
        }
        .box { width: 100%; padding: 14px; margin-bottom: 12px; border: 1.5px solid #ddd; border-radius: 12px; font-size: 1rem; }
        .btn { width: 100%; padding: 16px; background: var(--p); color: white; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 1.05rem; margin-top: 15px; }
        .btn-sub { width: 100%; padding: 16px; background: #eee; color: #555; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 1.05rem; margin-top: 10px; }
       
        .header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; font-weight: bold; }
        #view { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f8f9fa; }
        .bbl { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; word-break: break-all; line-height: 1.4; }
        .me { background: var(--p); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ot { background: #e2e8f0; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .bar { padding: 10px; border-top: 1px solid #eee; display: flex; gap: 8px; background: white; }
        #in { flex: 1; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 25px; font-size: 16px; }
       
        .review-item { background: var(--p-light); padding: 15px; border-radius: 12px; margin-bottom: 10px; width: 100%; text-align: left; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .review-item:hover, .review-item:active { border-color: var(--p); transform: scale(0.98); }
        .admin-card { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .admin-card strong { color: var(--p); }
       
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--p); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 30px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .grid-container {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }
        .choice-btn {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 8px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 48px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            font-size: 0.9rem;
        }
        .choice-btn:hover {
            border-color: var(--p-light);
            box-shadow: 0 3px 10px rgba(90,103,216,0.1);
            transform: translateY(-1px);
        }
        .choice-btn.selected {
            border: none;
            background: linear-gradient(135deg, #7c8dff, #5a67d8);
            color: white;
            box-shadow: 0 4px 12px rgba(90,103,216,0.3);
        }
        .choice-icon { 
            font-size: 1.4rem;
            flex-shrink: 0;
        }
        .choice-label {
            font-weight: 600;
            font-size: 0.82rem;
            text-align: left;
            line-height: 1.25;
        }

        /* 프로필 섹션 */
        .profile-section { 
            margin: 0 0 35px; 
            width: 100%; 
            text-align: center; 
            padding: 18px; 
            background: white; 
            border-radius: 16px; 
            border: 1px solid #e0e0e0; 
        }
        .profile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
        }
        .profile-pic { 
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            background: #eee url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="50" y="55" font-size="60" text-anchor="middle" dominant-baseline="middle" fill="%23ccc">❤️</text></svg>') center no-repeat;
            background-size: 60%;
        }
        .my-id-display {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--p);
            margin: 10px 0 15px;
            text-align: center;
        }
        .upload-btn { 
            margin-top: 8px;
            padding: 5px 12px;
            background: var(--p);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .preview-container { 
            position: relative;
            display: inline-block;
        }
        .preview-container input[type="file"] { 
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .bio-input { 
            width: 100%;
            max-width: 400px;
            padding: 12px;
            border: 1.5px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            resize: vertical;
            min-height: 80px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="app">
   
    <div id="pg-auth" class="page show">
        <div class="content">
            <!-- 앱 로고 추가 -->
            <img src="https://files.oaiusercontent.com/file-8d2c3a0d-5e3c-4a1b-8f5a-7d7c0e9d8f2c?se=2026-03-07T01%3A00%3A00Z&sp=r&sv=2024-08-04&sr=b&rscca=1&sig=example-signature" alt="MINDWAVE 로고" class="logo">
            
            <h1 style="color:var(--p); margin-bottom:30px;">마음 주파수</h1>
            <input type="text" id="userid" class="box" placeholder="아이디 (닉네임)" maxlength="12">
            <input type="password" id="userpw" class="box" placeholder="비밀번호">
            <button class="btn" onclick="login()">로그인</button>
            <button class="btn-sub" onclick="signup()">회원가입</button>
        </div>
    </div>

    <!-- 나머지 페이지들 (pg-setup, pg-waiting, pg-chat, pg-review, pg-admin)은 변경 없음 -->
    <div id="pg-setup" class="page">
        <div class="content" style="padding-top: 30px;">
            <div class="profile-section">
                <h3 style="margin-bottom: 10px; color: #444; font-size: 1.1rem;">나를 소개해주세요</h3>
                <div class="my-id-display" id="my-id-display"></div>
                
                <div class="profile-container">
                    <div class="preview-container">
                        <img id="profile-preview" class="profile-pic" src="" alt="프로필 사진">
                        <input type="file" id="profile-upload" accept="image/*" onchange="previewProfile(event)">
                    </div>
                    <button class="upload-btn" onclick="document.getElementById('profile-upload').click()">사진 업로드 / 변경</button>
                </div>
                <p style="color:#777; font-size:0.8rem; margin: 6px 0;">JPG/PNG, 최대 5MB</p>
                <textarea id="bio-input" class="bio-input" placeholder="어떤 마음을 나누고 싶으신가요? 😊"></textarea>
            </div>

            <!-- 기존 감정/성향 그리드 및 버튼들 생략 (이전과 동일) -->
            <p style="align-self: flex-start; margin-bottom: 10px; font-weight: bold; color: #555; font-size: 1rem;">현재 내 감정</p>
            <!-- ... 감정 그리드 ... -->

            <p style="align-self: flex-start; margin: 35px 0 10px; font-weight: bold; color: #555; font-size: 1rem;">대화 상대의 성향</p>
            <!-- ... 성향 그리드 ... -->

            <button class="btn" onclick="saveProfileAndMatch()">대화 시작하기</button>
            <button id="btn-admin" class="btn-sub" style="display:none; margin-top:20px;" onclick="goAdmin()">관리자 모드 접속</button>
        </div>
    </div>

    <!-- pg-waiting, pg-chat, pg-review, pg-admin 등 나머지 부분은 이전과 동일하게 유지 -->
    <!-- (코드 길이 절약을 위해 생략했으나 실제로는 그대로 복사해서 사용하세요) -->
</div>

<script>
    // 기존 스크립트 그대로 유지 (login(), loadProfile() 등)
    // ... 이전 스크립트 내용 ...

    function login() {
        const id = document.getElementById('userid').value.trim();
        const pw = document.getElementById('userpw').value.trim();
        if(!id || !pw) return alert("아이디와 비밀번호를 입력해주세요.");
        db.ref('users/' + id).once('value', snap => {
            if(!snap.exists() || snap.val().pw !== pw) return alert("정보가 일치하지 않습니다.");
           
            currentUser = { id: id, nick: id, isAdmin: snap.val().isAdmin || (id === 'admin') };
            document.getElementById('btn-admin').style.display = currentUser.isAdmin ? 'block' : 'none';
            document.getElementById('my-id-display').innerText = currentUser.nick;
            
            loadProfile();
            go('pg-setup');
        });
    }

    // ... 나머지 함수들 (loadProfile, saveProfileAndMatch 등) 이전과 동일 ...
</script>
</body>
</html>
