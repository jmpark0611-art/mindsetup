<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>마음 주파수 - 정식 버전</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="마음주파수">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/jmpark0611-art/mindsetup/main/mindwave-logo.png.png">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    
    <style>
        :root { --p: #5a67d8; --bg: #f0f2f5; --p-light: #ebedf9; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; background: var(--bg); font-family: 'Apple SD Gothic Neo', sans-serif; }
        .app { background: white; width: 100%; max-width: 450px; height: 100%; position: relative; margin: 0 auto; display: flex; flex-direction: column; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        
        .page { position: absolute; inset: 0; display: none; flex-direction: column; background: white; z-index: 10; overflow-y: auto; }
        .show { display: flex !important; }
        .content { padding: 20px 24px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* 로고 스타일 보정 */
        .logo-container { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo { width: 200px; height: auto; margin-bottom: 10px; display: block; }
        #logo-fallback { font-size: 3rem; margin-bottom: 10px; display: none; }
        
        .title { color: var(--p); font-size: 1.8rem; margin-bottom: 40px; font-weight: bold; }
        .box { width: 100%; max-width: 360px; padding: 16px; margin-bottom: 12px; border: 1.5px solid #ddd; border-radius: 12px; font-size: 1rem; }
        .btn { width: 100%; max-width: 360px; padding: 18px; background: var(--p); color: white; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin: 15px 0 10px; }
        .btn-sub { width: 100%; max-width: 360px; padding: 18px; background: #eee; color: #555; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .link-btn { background:none; border:none; color:var(--p); text-decoration:underline; cursor:pointer; font-size:0.95rem; margin-top:15px; }

        /* 매칭 & 프로필 UI */
        .grid-container { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .choice-btn { background: white; border: 2px solid #e0e0e0; border-radius: 12px; padding: 8px 10px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 10px; min-height: 48px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); font-size: 0.9rem; }
        .choice-btn.selected { border: none; background: linear-gradient(135deg, #7c8dff, #5a67d8); color: white; box-shadow: 0 4px 12px rgba(90,103,216,0.3); }
        .profile-section { margin: 0 0 25px; width: 100%; padding: 18px; background: white; border-radius: 16px; border: 1px solid #e0e0e0; }
        .profile-pic { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); background: #eee; }
        .bio-input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 12px; font-size: 0.9rem; resize: none; min-height: 60px; margin-top: 10px; }

        /* 채팅 UI */
        .header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        #view { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f8f9fa; }
        .bbl { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; word-break: break-all; }
        .me { background: var(--p); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ot { background: #e2e8f0; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .bar { padding: 10px; border-top: 1px solid #eee; display: flex; gap: 8px; background: white; }
        #in { flex: 1; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 25px; font-size: 16px; }

        /* 피드백 & 관리자 */
        .review-item { background: var(--p-light); padding: 15px; border-radius: 12px; margin-bottom: 10px; width: 100%; text-align: left; cursor: pointer; }
        .admin-card { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: left; }
    </style>
</head>
<body>
<div class="app">
    
    <div id="pg-auth" class="page show"><div class="content">
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/jmpark0611-art/mindsetup/main/mindwave-logo.png.png" 
                 alt="MindWave 로고" class="logo" id="main-logo"
                 onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block';">
            <div id="logo-fallback">🌊</div>
        </div>
        <h1 class="title">마음 주파수</h1>
        <input type="text" id="userid" class="box" placeholder="아이디 (닉네임)" maxlength="12">
        <input type="password" id="userpw" class="box" placeholder="비밀번호">
        <button class="btn" onclick="login()">로그인</button>
        <button class="btn-sub" onclick="signup()">회원가입</button>
        <button class="link-btn" onclick="go('pg-reset-pw')">비밀번호 초기화</button>
    </div></div>

    <div id="pg-reset-pw" class="page"><div class="content">
        <h2 style="color:var(--p); margin-bottom:20px;">비밀번호 초기화</h2>
        <input type="text" id="reset-id" class="box" placeholder="아이디 입력">
        <button class="btn" onclick="resetPassword()">0000으로 초기화</button>
        <button class="btn-sub" onclick="go('pg-auth')">돌아가기</button>
    </div></div>

    <div id="pg-setup" class="page"><div class="content">
        <div class="profile-section">
            <div id="my-id-display" style="font-weight:bold; color:var(--p); margin-bottom:10px;"></div>
            <img id="profile-preview" class="profile-pic" src="">
            <input type="file" id="profile-upload" accept="image/*" style="display:none;" onchange="previewProfile(event)">
            <button class="link-btn" style="display:block; margin:5px auto;" onclick="document.getElementById('profile-upload').click()">사진 변경</button>
            <textarea id="bio-input" class="bio-input" placeholder="한 줄 소개를 적어주세요."></textarea>
        </div>

        <p style="align-self:flex-start; font-weight:bold; margin-bottom:10px;">현재 내 감정</p>
        <div class="grid-container" id="emotion-grid">
            <button class="choice-btn" data-value="번아웃" onclick="selectEmotion(this)">🔥 번아웃</button>
            <button class="choice-btn" data-value="외로움" onclick="selectEmotion(this)">☁️ 외로움</button>
            <button class="choice-btn" data-value="슬픔" onclick="selectEmotion(this)">🌧️ 슬픔</button>
            <button class="choice-btn" data-value="화남" onclick="selectEmotion(this)">⚡ 화남</button>
        </div>

        <p style="align-self:flex-start; font-weight:bold; margin-bottom:10px;">상대 성향</p>
        <div class="grid-container" id="persona-grid">
            <button class="choice-btn" data-value="공감형" onclick="selectPersona(this)">🤝 공감형</button>
            <button class="choice-btn" data-value="조언형" onclick="selectPersona(this)">💡 조언형</button>
            <button class="choice-btn" data-value="침묵형" onclick="selectPersona(this)">🤫 침묵형</button>
            <button class="choice-btn" data-value="일상" onclick="selectPersona(this)">☕ 일상</button>
        </div>

        <button class="btn" onclick="saveProfileAndMatch()">매칭 시작하기</button>
        <button id="btn-admin" class="btn-sub" style="display:none;" onclick="goAdmin()">관리자 대시보드</button>
    </div></div>

    <div id="pg-waiting" class="page"><div class="content">
        <h2>주파수 찾는 중...</h2>
        <div style="width:40px; height:40px; border:4px solid #f3f3f3; border-top:4px solid var(--p); border-radius:50%; animation:spin 1s linear infinite; margin:20px;"></div>
        <button class="link-btn" onclick="location.reload()">취소하기</button>
    </div></div>

    <div id="pg-chat" class="page">
        <div class="header">
            <span id="chat-title">대화 중 📡</span>
            <button onclick="endChat()" style="background:none; border:1px solid white; color:white; padding:4px 8px; border-radius:6px;">종료</button>
        </div>
        <div id="view"></div>
        <div class="bar">
            <input type="text" id="in" placeholder="메시지 입력..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="color:var(--p); font-weight:bold; background:none; border:none;">전송</button>
        </div>
    </div>

    <div id="pg-review" class="page"><div class="content">
        <h2 style="color:var(--p); margin-bottom:20px;">가장 힘이 된 말은?</h2>
        <div id="review-list" style="width:100%; flex:1; overflow-y:auto;"></div>
        <button class="btn-sub" onclick="go('pg-setup')">건너뛰기</button>
    </div></div>

    <div id="pg-admin" class="page">
        <div class="header" style="background:#333;"><span>관리자 모드</span><button onclick="go('pg-setup')" style="color:white; background:none; border:none;">닫기</button></div>
        <div id="admin-view" style="padding:15px; flex:1; overflow-y:auto; background:#f0f2f5;"></div>
    </div>

</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCQKm1ZWeMN_YFpP3Cs_LdcQV8vRFcALfs",
        authDomain: "mindsetup.firebaseapp.com",
        databaseURL: "https://mindsetup-default-rtdb.firebaseio.com",
        projectId: "mindsetup",
        storageBucket: "mindsetup.firebasestorage.app",
        messagingSenderId: "484997102046",
        appId: "1:484997102046:web:8acdb93d3a03fc6c14054f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = { id: "", nick: "", isAdmin: false };
    let myRoom = "";
    let isMatched = false;
    let receivedMessages = [];
    let selectedEmotion = "";
    let selectedPersona = "";

    function go(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
        document.getElementById(id).classList.add('show');
    }

    function signup() {
        const id = document.getElementById('userid').value.trim();
        const pw = document.getElementById('userpw').value.trim();
        if (!id || !pw) return alert("입력 정보가 부족합니다.");
        db.ref('users/' + id).set({ pw: pw, isAdmin: (id === 'admin') }).then(() => alert("가입 완료!"));
    }

    function login() {
        const id = document.getElementById('userid').value.trim();
        const pw = document.getElementById('userpw').value.trim();
        db.ref('users/' + id).once('value', snap => {
            if (snap.exists() && snap.val().pw === pw) {
                currentUser = { id: id, nick: id, isAdmin: snap.val().isAdmin || id === 'admin' };
                document.getElementById('my-id-display').innerText = id;
                document.getElementById('btn-admin').style.display = currentUser.isAdmin ? 'block' : 'none';
                go('pg-setup');
            } else alert("정보가 틀립니다.");
        });
    }

    function resetPassword() {
        const id = document.getElementById('reset-id').value.trim();
        if(id) db.ref('users/' + id).update({ pw: '0000' }).then(() => alert("초기화 완료(0000)"));
    }

    function previewProfile(event) {
        const reader = new FileReader();
        reader.onload = e => document.getElementById('profile-preview').src = e.target.result;
        reader.readAsDataURL(event.target.files[0]);
    }

    function selectEmotion(btn) {
        document.querySelectorAll('#emotion-grid .choice-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); selectedEmotion = btn.dataset.value;
    }

    function selectPersona(btn) {
        document.querySelectorAll('#persona-grid .choice-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); selectedPersona = btn.dataset.value;
    }

    function saveProfileAndMatch() {
        if(!selectedEmotion || !selectedPersona) return alert("감정과 성향을 선택해주세요.");
        go('pg-waiting');
        const qRef = db.ref('match_queue');
        qRef.limitToFirst(1).once('value', snap => {
            if(snap.exists()){
                const key = Object.keys(snap.val())[0];
                myRoom = snap.val()[key].roomID;
                qRef.child(key).remove().then(() => initChat());
            } else {
                myRoom = "R_" + Date.now();
                qRef.push({ roomID: myRoom, emotion: selectedEmotion });
                db.ref('rooms/' + myRoom + '/users').push(currentUser.nick);
                const uRef = db.ref('rooms/' + myRoom + '/users');
                uRef.on('child_added', () => {
                    uRef.once('value', s => { if(s.numChildren() >= 2) initChat(); });
                });
            }
        });
    }

    function initChat() {
        if(isMatched) return; isMatched = true;
        receivedMessages = []; document.getElementById('view').innerHTML = '';
        go('pg-chat');
        const mRef = db.ref('rooms/' + myRoom + '/messages');
        mRef.on('child_added', snap => {
            const m = snap.val();
            const side = m.sender === currentUser.nick ? 'me' : 'ot';
            if(side === 'ot') receivedMessages.push(m.text);
            const d = document.createElement('div');
            d.className = "bbl " + side; d.innerText = m.text;
            document.getElementById('view').appendChild(d);
            document.getElementById('view').scrollTop = document.getElementById('view').scrollHeight;
        });
    }

    function send() {
        const txt = document.getElementById('in').value.trim();
        if(txt) {
            db.ref('rooms/' + myRoom + '/messages').push({ sender: currentUser.nick, text: txt });
            document.getElementById('in').value = '';
        }
    }

    function endChat() {
        isMatched = false;
        const list = document.getElementById('review-list');
        list.innerHTML = '';
        receivedMessages.forEach(m => {
            const d = document.createElement('div');
            d.className = 'review-item'; d.innerText = m;
            d.onclick = () => {
                db.ref('good_quotes').push({ text: m, from_user: currentUser.nick, time: new Date().toLocaleString() });
                alert("저장되었습니다."); go('pg-setup');
            };
            list.appendChild(d);
        });
        go('pg-review');
    }

    function goAdmin() {
        go('pg-admin');
        db.ref('good_quotes').once('value', snap => {
            const v = document.getElementById('admin-view');
            v.innerHTML = '';
            snap.forEach(c => {
                const d = document.createElement('div');
                d.className = 'admin-card';
                d.innerHTML = `<strong>"${c.val().text}"</strong><br><small>${c.val().time}</small>`;
                v.appendChild(d);
            });
        });
    }
</script>
<style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>
</body>
</html>
