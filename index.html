<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>마음 주파수 - 정식 버전</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <style>
        :root { --p: #5a67d8; --bg: #f0f2f5; --p-light: #ebedf9; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; background: var(--bg); font-family: 'Apple SD Gothic Neo', sans-serif; }
        .app { background: white; width: 100%; max-width: 450px; height: 100%; position: relative; margin: 0 auto; display: flex; flex-direction: column; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
       
        .page { position: absolute; inset: 0; display: none; flex-direction: column; background: white; z-index: 10; overflow-y: auto; }
        .show { display: flex !important; }
        .content { padding: 40px 24px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; }
       
        .box { width: 100%; padding: 16px; margin-bottom: 12px; border: 1.5px solid #ddd; border-radius: 12px; font-size: 1rem; }
        .btn { width: 100%; padding: 18px; background: var(--p); color: white; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin: 30px 0 10px; }
        .btn-sub { width: 100%; padding: 18px; background: #eee; color: #555; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
       
        .header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; font-weight: bold; }
        #view { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f8f9fa; }
        .bbl { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; word-break: break-all; line-height: 1.4; }
        .me { background: var(--p); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ot { background: #e2e8f0; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .bar { padding: 10px; border-top: 1px solid #eee; display: flex; gap: 8px; background: white; }
        #in { flex: 1; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 25px; font-size: 16px; }
       
        .review-item { background: var(--p-light); padding: 15px; border-radius: 12px; margin-bottom: 10px; width: 100%; text-align: left; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .review-item:hover, .review-item:active { border-color: var(--p); transform: scale(0.98); }
        .admin-card { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .admin-card strong { color: var(--p); }
       
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--p); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 30px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .grid-container {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }
        .choice-btn {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 110px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }
        .choice-btn:hover {
            border-color: var(--p-light);
            box-shadow: 0 6px 16px rgba(90,103,216,0.15);
            transform: translateY(-3px);
        }
        .choice-btn.selected {
            border: none;
            background: linear-gradient(135deg, #7c8dff, #5a67d8);
            color: white;
            box-shadow: 0 8px 24px rgba(90,103,216,0.4);
            transform: scale(1.04) translateY(-4px);
            animation: pulseGlow 1.6s infinite alternate ease-in-out;
        }
        @keyframes pulseGlow {
            0%   { box-shadow: 0 8px 24px rgba(90,103,216,0.4); transform: scale(1.04) translateY(-4px); }
            100% { box-shadow: 0 12px 32px rgba(90,103,216,0.6); transform: scale(1.06) translateY(-5px); }
        }
        .choice-icon { font-size: 2.4rem; margin-bottom: 8px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15)); }
        .choice-label { font-weight: 600; color: inherit; line-height: 1.3; font-size: 0.9rem; }
        .choice-btn.selected .choice-label { color: white; font-weight: bold; }

        /* 프로필 커스터마이징 스타일 */
        .profile-section { 
            margin: 0 0 40px; 
            width: 100%; 
            text-align: center; 
            padding: 20px; 
            background: #f9f9ff; 
            border-radius: 16px; 
            border: 1px solid var(--p-light); 
        }
        .profile-pic { 
            width: 110px; 
            height: 110px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 4px solid white; 
            box-shadow: 0 4px 12px rgba(90,103,216,0.2); 
            background: #eee; 
        }
        .upload-btn { 
            margin-top: 12px; 
            padding: 10px 24px; 
            background: var(--p); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        .preview-container { 
            position: relative; 
            display: inline-block; 
        }
        .preview-container input[type="file"] { 
            position: absolute; 
            opacity: 0; 
            width: 100%; 
            height: 100%; 
            cursor: pointer; 
        }
        .bio-input { 
            width: 100%; 
            max-width: 400px; 
            padding: 12px; 
            border: 1.5px solid #ddd; 
            border-radius: 12px; 
            font-size: 1rem; 
            resize: vertical; 
            min-height: 80px; 
            margin-top: 12px; 
        }
    </style>
</head>
<body>
<div class="app">
   
    <div id="pg-auth" class="page show"><div class="content">
        <h1 style="color:var(--p); margin-bottom:30px;">마음 주파수</h1>
        <input type="text" id="userid" class="box" placeholder="아이디 (닉네임)" maxlength="12">
        <input type="password" id="userpw" class="box" placeholder="비밀번호">
        <button class="btn" onclick="login()">로그인</button>
        <button class="btn-sub" onclick="signup()">회원가입</button>
    </div></div>

    <div id="pg-setup" class="page">
        <div class="content" style="padding-top: 40px;">
            <h2 style="margin-bottom: 30px; color: #333; font-size: 1.4rem;">어떤 대화가 필요하신가요?</h2>

            <!-- 프로필 커스터마이징 섹션 추가 -->
            <div class="profile-section">
                <h3 style="margin-bottom: 15px; color: #444; font-size: 1.2rem;">나를 소개해주세요</h3>
                
                <div class="preview-container">
                    <img id="profile-preview" class="profile-pic" src="https://via.placeholder.com/110?text=사진" alt="프로필 사진">
                    <input type="file" id="profile-upload" accept="image/*" onchange="previewProfile(event)">
                </div>
                
                <button class="upload-btn" onclick="document.getElementById('profile-upload').click()">사진 업로드 / 변경</button>
                <p style="color:#777; font-size:0.85rem; margin: 8px 0;">JPG/PNG, 최대 5MB</p>

                <textarea id="bio-input" class="bio-input" placeholder="한 줄 소개를 적어주세요 (예: 따뜻한 위로가 필요해요 :) )"></textarea>
            </div>

            <!-- 기존 감정 상태 선택 -->
            <p style="align-self: flex-start; margin-bottom: 12px; font-weight: bold; color: #555; font-size: 1.1rem;">지금 내 기분은...</p>
            <div class="grid-container" id="emotion-grid">
                <button class="choice-btn" data-value="지침" onclick="selectEmotion(this)">
                    <div class="choice-icon">😓</div>
                    <div class="choice-label">오늘 너무 지쳤어요</div>
                </button>
                <button class="choice-btn" data-value="우울함" onclick="selectEmotion(this)">
                    <div class="choice-icon">🥺</div>
                    <div class="choice-label">조금 우울해요</div>
                </button>
                <button class="choice-btn" data-value="기쁨" onclick="selectEmotion(this)">
                    <div class="choice-icon">🥰</div>
                    <div class="choice-label">행복을 나누고 싶어요</div>
                </button>
                <button class="choice-btn" data-value="심심함" onclick="selectEmotion(this)">
                    <div class="choice-icon">😶‍🌫️</div>
                    <div class="choice-label">소소한 수다가 필요해요</div>
                </button>
            </div>

            <!-- 기존 원하는 상대방 선택 -->
            <p style="align-self: flex-start; margin: 45px 0 12px; font-weight: bold; color: #555; font-size: 1.1rem;">원하는 상대방은...</p>
            <div class="grid-container" id="persona-grid">
                <button class="choice-btn" data-value="공감형" onclick="selectPersona(this)">
                    <div class="choice-icon">🫂</div>
                    <div class="choice-label">따뜻하게 공감해줄 사람</div>
                </button>
                <button class="choice-btn" data-value="해결사" onclick="selectPersona(this)">
                    <div class="choice-icon">🛠️</div>
                    <div class="choice-label">현실적인 조언을 주는 사람</div>
                </button>
                <button class="choice-btn" data-value="경청형" onclick="selectPersona(this)">
                    <div class="choice-icon">👂💕</div>
                    <div class="choice-label">묵묵히 들어줄 사람</div>
                </button>
            </div>

            <button class="btn" onclick="saveProfileAndMatch()">주파수 맞추기 (매칭)</button>
            <button id="btn-admin" class="btn-sub" style="display:none; margin-top:20px;" onclick="goAdmin()">관리자 모드 접속</button>
        </div>
    </div>

    <div id="pg-waiting" class="page"><div class="content">
        <h2>주파수 찾는 중...</h2>
        <div class="loader"></div>
        <p style="color:#666;">나와 결이 맞는 사람을 찾고 있어요.</p>
        <button onclick="go('pg-setup')" style="margin-top:30px; color:#999; border:none; background:none; text-decoration:underline;">취소하기</button>
    </div></div>

    <div id="pg-chat" class="page">
        <div class="header">
            <span>대화 중 📡</span>
            <button onclick="endChat()" style="background:none; border:1px solid white; color:white; padding:5px 10px; border-radius:8px; cursor:pointer;">대화 종료</button>
        </div>
        <div style="background:#fff3cd; color:#856404; padding:8px; text-align:center; font-size:0.85rem;" id="chat-info"></div>
        <div id="view"></div>
        <div class="bar">
            <input type="text" id="in" placeholder="메시지를 입력하세요..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="border:none; background:none; color:var(--p); font-weight:bold; padding:0 10px;">전송</button>
        </div>
    </div>

    <div id="pg-review" class="page"><div class="content" style="justify-content: flex-start; padding-top:60px;">
        <h2 style="color:var(--p); margin-bottom:10px;">어떤 말이 가장 위로가 되었나요?</h2>
        <p style="color:#666; font-size:0.9rem; margin-bottom:30px;">상대방이 한 말 중 가장 좋았던 문장을 선택해주세요.</p>
        <div id="review-list" style="width:100%; overflow-y:auto; flex:1; padding-bottom:20px;"></div>
        <button class="btn-sub" onclick="finishApp()">건너뛰기 / 홈으로</button>
    </div></div>

    <div id="pg-admin" class="page">
        <div class="header" style="background:#333;">
            <span>관리자 대시보드</span>
            <button onclick="go('pg-setup')" style="background:none; border:1px solid white; color:white; padding:5px; border-radius:5px;">닫기</button>
        </div>
        <div style="padding:15px; overflow-y:auto; flex:1; background:#f0f2f5;" id="admin-view"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCQKm1ZWeMN_YFpP3Cs_LdcQV8vRFcALfs",
        authDomain: "mindsetup.firebaseapp.com",
        databaseURL: "https://mindsetup-default-rtdb.firebaseio.com",
        projectId: "mindsetup",
        storageBucket: "mindsetup.firebasestorage.app",
        messagingSenderId: "484997102046",
        appId: "1:484997102046:web:8acdb93d3a03fc6c14054f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    let currentUser = { id: "", nick: "", isAdmin: false };
    let myRoom = "";
    let isMatched = false;
    let receivedMessages = [];
    let selectedEmotion = "";
    let selectedPersona = "";

    function go(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
        document.getElementById(id).classList.add('show');
    }

    function signup() {
        const id = document.getElementById('userid').value.trim();
        const pw = document.getElementById('userpw').value.trim();
        if(!id || !pw) return alert("아이디와 비밀번호를 모두 입력해주세요.");
       
        db.ref('users/' + id).once('value', snap => {
            if(snap.exists()) return alert("이미 존재하는 아이디입니다.");
           
            const isAdmin = (id === 'admin');
            db.ref('users/' + id).set({ pw: pw, isAdmin: isAdmin }).then(() => {
                alert("회원가입 완료! 로그인 해주세요.");
            });
        });
    }

    function login() {
        const id = document.getElementById('userid').value.trim();
        const pw = document.getElementById('userpw').value.trim();
        if(!id || !pw) return alert("아이디와 비밀번호를 입력해주세요.");
        db.ref('users/' + id).once('value', snap => {
            if(!snap.exists() || snap.val().pw !== pw) return alert("정보가 일치하지 않습니다.");
           
            currentUser = { id: id, nick: id, isAdmin: snap.val().isAdmin || (id === 'admin') };
            document.getElementById('btn-admin').style.display = currentUser.isAdmin ? 'block' : 'none';
            
            loadProfile();  // 프로필 불러오기
            go('pg-setup');
        });
    }

    function loadProfile() {
        if (!currentUser.id) return;
        db.ref('users/' + currentUser.id + '/profile').once('value', snap => {
            const data = snap.val();
            if (data) {
                if (data.photoUrl) {
                    document.getElementById('profile-preview').src = data.photoUrl;
                }
                if (data.bio) {
                    document.getElementById('bio-input').value = data.bio;
                }
            }
        });
    }

    function previewProfile(event) {
        const file = event.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) return alert("5MB 이하 파일만 업로드 가능합니다.");

        const reader = new FileReader();
        reader.onload = e => {
            document.getElementById('profile-preview').src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function saveProfileAndMatch() {
        if (!currentUser.id) return alert("로그인 상태를 확인해주세요.");

        const bio = document.getElementById('bio-input').value.trim();
        const profileUpdates = {};

        if (bio) {
            profileUpdates.bio = bio;
        }

        if (Object.keys(profileUpdates).length > 0) {
            db.ref('users/' + currentUser.id + '/profile').update({
                ...profileUpdates,
                updatedAt: firebase.database.ServerValue.TIMESTAMP
            });
        }

        // 기존 매칭 시작
        if (!selectedEmotion) return alert("지금 기분을 선택해주세요.");
        if (!selectedPersona) return alert("원하는 상대 유형을 선택해주세요.");

        go('pg-waiting');

        const qRef = db.ref('match_queue');
        qRef.limitToFirst(1).once('value', (snap) => {
            if (snap.exists()) {
                const data = snap.val();
                const key = Object.keys(data)[0];
                myRoom = data[key].roomID;
                const oppoEmo = data[key].emotion;
                qRef.child(key).remove().then(() => {
                    initChat(oppoEmo, selectedPersona);
                });
            } else {
                myRoom = "R_" + Date.now();
                const myQ = qRef.push();
                myQ.set({ 
                    roomID: myRoom, 
                    name: currentUser.nick, 
                    emotion: selectedEmotion 
                });
                myQ.onDisconnect().remove();
                db.ref('rooms/' + myRoom + '/users').push(currentUser.nick);
               
                const uRef = db.ref('rooms/' + myRoom + '/users');
                const check = () => {
                    uRef.once('value', s => {
                        if(s.numChildren() >= 2) {
                            uRef.off('child_added', check);
                            initChat(selectedEmotion, selectedPersona);
                        }
                    });
                };
                uRef.on('child_added', check);
            }
        });
    }

    function selectEmotion(btn) {
        document.querySelectorAll('#emotion-grid .choice-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedEmotion = btn.dataset.value;
    }

    function selectPersona(btn) {
        document.querySelectorAll('#persona-grid .choice-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedPersona = btn.dataset.value;
    }

    function initChat(myE, targetP) {
        if(isMatched) return;
        isMatched = true;
        receivedMessages = [];
        document.getElementById('view').innerHTML = '';
       
        document.getElementById('chat-info').innerText = `상대방은 당신의 [${myE}]에 귀 기울일 준비가 되었습니다.`;
        go('pg-chat');

        db.ref('rooms/' + myRoom + '/users').once('value', s => {
            let found = false;
            s.forEach(c => { if(c.val() === currentUser.nick) found = true; });
            if(!found) db.ref('rooms/' + myRoom + '/users').push(currentUser.nick);
        });

        const mRef = db.ref('rooms/' + myRoom + '/messages');
        mRef.off();
        mRef.on('child_added', snap => {
            const m = snap.val();
            const side = m.sender === currentUser.nick ? 'me' : 'ot';
            if(side === 'ot') receivedMessages.push({ text: m.text, sender: m.sender });
            renderMsg(side, m.text);
        });
    }

    function send() {
        const inp = document.getElementById('in');
        const txt = inp.value.trim();
        if(!txt) return;
       
        db.ref('rooms/' + myRoom + '/messages').push({
            sender: currentUser.nick, text: txt, ts: Date.now()
        });
        inp.value = ""; inp.focus();
    }

    function renderMsg(side, text) {
        const v = document.getElementById('view');
        const d = document.createElement('div');
        d.className = "bbl " + side;
        d.innerText = text;
        v.appendChild(d);
        v.scrollTop = v.scrollHeight;
    }

    function endChat() {
        if(!confirm("대화를 종료하시겠습니까?")) return;
        isMatched = false;
       
        if(receivedMessages.length === 0) {
            alert("수고하셨습니다!");
            go('pg-setup');
            return;
        }

        const rList = document.getElementById('review-list');
        rList.innerHTML = '';
        receivedMessages.forEach(msg => {
            const d = document.createElement('div');
            d.className = 'review-item';
            d.innerText = `"${msg.text}"`;
            d.onclick = () => saveQuote(msg.text, msg.sender);
            rList.appendChild(d);
        });
       
        go('pg-review');
    }

    function saveQuote(text, sender) {
        db.ref('good_quotes').push({
            text: text,
            from: sender,
            to: currentUser.nick,
            time: new Date().toLocaleString()
        }).then(() => {
            alert("소중한 감정이 기록되었습니다. 감사합니다!");
            finishApp();
        });
    }

    function finishApp() {
        go('pg-setup');
    }

    function goAdmin() {
        go('pg-admin');
        const v = document.getElementById('admin-view');
        v.innerHTML = '<div class="loader"></div>';
        db.ref('good_quotes').once('value', snap => {
            v.innerHTML = '';
            if(!snap.exists()) return v.innerHTML = '<p style="text-align:center; padding:20px;">아직 기록된 따뜻한 말이 없습니다.</p>';
           
            snap.forEach(child => {
                const data = child.val();
                const d = document.createElement('div');
                d.className = 'admin-card';
                d.innerHTML = `
                    <p style="font-size:1.1rem; margin-bottom:8px;">"${data.text}"</p>
                    <p style="font-size:0.85rem; color:#666;">보낸사람: <strong>${data.from}</strong> ➔ 받은사람: ${data.to}</p>
                    <p style="font-size:0.75rem; color:#999; margin-top:5px;">${data.time}</p>
                `;
                v.insertBefore(d, v.firstChild);
            });
        });
    }
</script>
</body>
</html>
