<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>마음 주파수 - 정식 버전</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script> <!-- 추가: Storage SDK -->
    <style>
        /* 기존 스타일 유지 + 프로필 관련 추가 */
        .profile-section { margin: 30px 0; width: 100%; text-align: center; }
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--p); margin-bottom: 15px; background: #eee; }
        .upload-btn { padding: 10px 20px; background: var(--p-light); color: var(--p); border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin: 10px 0; }
        .bio-input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 12px; font-size: 1rem; resize: none; height: 80px; }
        .preview-container { position: relative; display: inline-block; }
        .preview-container input[type="file"] { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
    </style>
</head>
<body>
<div class="app">
    <!-- pg-auth, pg-waiting, pg-chat 등 기존 페이지 유지 -->

    <div id="pg-setup" class="page">
        <div class="content" style="padding-top: 40px;">
            <h1 style="color:var(--p); margin-bottom: 25px; font-size: 1.8rem;">프로필 설정 & 매칭 준비</h1>

            <!-- 새로 추가: 프로필 커스터마이징 섹션 -->
            <div class="profile-section">
                <h3 style="margin-bottom: 15px; color: #555;">나를 소개해주세요</h3>
                <div class="preview-container">
                    <img id="profile-preview" class="profile-pic" src="https://via.placeholder.com/120?text=사진" alt="프로필 사진">
                    <input type="file" id="profile-upload" accept="image/*" onchange="previewAndUploadProfile(event)">
                </div>
                <button class="upload-btn" onclick="document.getElementById('profile-upload').click()">사진 선택 / 변경</button>
                <p style="color:#888; font-size:0.9rem; margin-top:5px;">JPG/PNG, 최대 5MB</p>
            </div>

            <div class="profile-section">
                <h3 style="margin-bottom: 10px; color: #555;">한 줄 소개 (바이오)</h3>
                <textarea id="bio-input" class="bio-input" placeholder="예: 오늘 좀 피곤하지만, 따뜻한 대화가 필요해요 :)"></textarea>
            </div>

            <!-- 기존 감정/성향 선택 부분 -->
            <p style="align-self: flex-start; margin-bottom: 16px; font-weight: bold; color: #555; font-size: 1.15rem;">지금 내 기분은...</p>
            <!-- ... 기존 감정 그리드 ... -->

            <p style="align-self: flex-start; margin: 45px 0 16px; font-weight: bold; color: #555; font-size: 1.15rem;">원하는 상대방은...</p>
            <!-- ... 기존 성향 그리드 ... -->

            <button class="btn" onclick="saveProfileAndMatch()">프로필 저장 & 매칭 시작</button>
            <button id="btn-admin" class="btn-sub" style="display:block; margin-top:20px;" onclick="goAdmin()">관리자 모드 접속</button>
        </div>
    </div>

    <!-- pg-chat 헤더에 프로필 표시 추가 -->
    <div id="pg-chat" class="page">
        <div class="header" style="flex-direction: column; align-items: flex-start; padding: 15px 20px;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img id="opponent-profile" class="profile-pic" src="https://via.placeholder.com/50" alt="상대 프로필" style="width:50px; height:50px; border:2px solid white;">
                <div>
                    <span style="font-size:1.1rem;">대화 중 📡</span><br>
                    <small id="opponent-bio" style="color:#ddd; font-size:0.85rem;">상대방 소개 로딩 중...</small>
                </div>
            </div>
            <button onclick="endChat()" style="background:none; border:1px solid white; color:white; padding:5px 10px; border-radius:8px; cursor:pointer; margin-top:10px;">대화 종료</button>
        </div>
        <!-- 나머지 채팅 UI -->
    </div>

    <!-- 나머지 페이지 생략 -->
</div>

<script>
    // 기존 Firebase 초기화
    const firebaseConfig = { /* 기존 config */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage(); // 추가: Storage 인스턴스

    // ... 기존 변수들 ...

    // 로그인 시 프로필 불러오기
    function login() {
        // 기존 로그인 로직 ...
        // 로그인 성공 후
        loadProfile(); // 추가
        go('pg-setup');
    }

    // 프로필 불러오기
    function loadProfile() {
        db.ref('users/' + currentUser.id + '/profile').once('value', snap => {
            const data = snap.val();
            if (data) {
                if (data.photoUrl) {
                    document.getElementById('profile-preview').src = data.photoUrl;
                }
                if (data.bio) {
                    document.getElementById('bio-input').value = data.bio;
                }
            }
        });
    }

    // 사진 미리보기 + 업로드 시작
    function previewAndUploadProfile(event) {
        const file = event.target.files[0];
        if (!file) return;

        // 미리보기
        const reader = new FileReader();
        reader.onload = e => {
            document.getElementById('profile-preview').src = e.target.result;
        };
        reader.readAsDataURL(file);

        // 실제 업로드 (저장 버튼 누를 때 하도록 변경 가능, 여기선 즉시 업로드 예시)
        uploadProfile(file);
    }

    // 프로필 사진 업로드
    function uploadProfile(file) {
        if (!currentUser.id) return alert("로그인 먼저 해주세요!");

        const ref = storage.ref('users/' + currentUser.id + '/profile.jpg');
        const task = ref.put(file);

        task.on('state_changed',
            snapshot => {
                // 진행률 표시 가능 (옵션)
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                console.log('Upload progress: ' + progress + '%');
            },
            error => {
                alert("업로드 실패: " + error.message);
            },
            () => {
                // 업로드 완료 → URL 가져오기
                task.snapshot.ref.getDownloadURL().then(url => {
                    // DB에 저장
                    db.ref('users/' + currentUser.id + '/profile').update({
                        photoUrl: url,
                        updatedAt: firebase.database.ServerValue.TIMESTAMP
                    });
                    alert("프로필 사진이 업데이트되었습니다!");
                });
            }
        );
    }

    // 바이오 + 프로필 저장 후 매칭 시작 (기존 startMatching 대신)
    function saveProfileAndMatch() {
        const bio = document.getElementById('bio-input').value.trim();
        if (bio) {
            db.ref('users/' + currentUser.id + '/profile').update({
                bio: bio,
                updatedAt: firebase.database.ServerValue.TIMESTAMP
            });
        }

        // 기존 매칭 로직 호출 (감정/성향 체크 포함)
        startMatching(); // 기존 함수 재사용
    }

    // 매칭 시 상대 프로필 정보 가져오기 (startMatching 내에서 확장)
    // 예: 큐에 상대 정보 저장 시 profile/photoUrl, bio도 함께 저장하도록 수정 필요
    // 간단 예시: initChat에서 상대 info 불러오기 (실제론 큐나 rooms에 저장)
    function initChat(myE, targetP) {
        // ... 기존 코드 ...

        // 상대 프로필 예시 불러오기 (실제론 매칭된 상대 UID 필요 - 큐에서 가져오도록 확장)
        // 여기선 플레이스홀더
        document.getElementById('opponent-profile').src = "https://via.placeholder.com/50?text=상대";
        document.getElementById('opponent-bio').innerText = "상대방 한 줄 소개...";
    }

    // ... 나머지 기존 함수들 ...
</script>
</body>
</html>
